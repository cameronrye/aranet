name: Publish Homebrew Formula

on:
  release:
    types: [published]

permissions:
  contents: read

jobs:
  homebrew:
    name: Update Homebrew Formula
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get release version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download release assets and compute checksums
        id: checksums
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          ASSETS_DIR=$(mktemp -d)
          cd "$ASSETS_DIR"

          # Download all release tarballs
          declare -A ASSETS=(
            ["CLI_MACOS_ARM64"]="aranet-cli-aarch64-apple-darwin.tar.xz"
            ["CLI_MACOS_X64"]="aranet-cli-x86_64-apple-darwin.tar.xz"
            ["CLI_LINUX_X64"]="aranet-cli-x86_64-unknown-linux-gnu.tar.xz"
            ["GUI_MACOS_ARM64"]="aranet-gui-aarch64-apple-darwin.tar.xz"
            ["GUI_MACOS_X64"]="aranet-gui-x86_64-apple-darwin.tar.xz"
            ["GUI_LINUX_X64"]="aranet-gui-x86_64-unknown-linux-gnu.tar.xz"
          )

          for key in "${!ASSETS[@]}"; do
            file="${ASSETS[$key]}"
            gh release download "v${VERSION}" --repo "$GITHUB_REPOSITORY" --pattern "$file" || true
            if [ -f "$file" ]; then
              sha=$(sha256sum "$file" | awk '{print $1}')
              echo "SHA256_${key}=${sha}" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::Asset $file not found in release"
              echo "SHA256_${key}=MISSING" >> "$GITHUB_OUTPUT"
            fi
          done

      - name: Generate formula from template
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          sed \
            -e "s/{{VERSION}}/$VERSION/g" \
            -e "s/{{SHA256_CLI_MACOS_ARM64}}/${{ steps.checksums.outputs.SHA256_CLI_MACOS_ARM64 }}/g" \
            -e "s/{{SHA256_CLI_MACOS_X64}}/${{ steps.checksums.outputs.SHA256_CLI_MACOS_X64 }}/g" \
            -e "s/{{SHA256_CLI_LINUX_X64}}/${{ steps.checksums.outputs.SHA256_CLI_LINUX_X64 }}/g" \
            -e "s/{{SHA256_GUI_MACOS_ARM64}}/${{ steps.checksums.outputs.SHA256_GUI_MACOS_ARM64 }}/g" \
            -e "s/{{SHA256_GUI_MACOS_X64}}/${{ steps.checksums.outputs.SHA256_GUI_MACOS_X64 }}/g" \
            -e "s/{{SHA256_GUI_LINUX_X64}}/${{ steps.checksums.outputs.SHA256_GUI_LINUX_X64 }}/g" \
            .github/homebrew/aranet.rb.template > aranet.rb

      - name: Push formula to tap
        uses: dmnemec/copy_file_to_another_repo_action@main
        env:
          API_TOKEN_GITHUB: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        with:
          source_file: 'aranet.rb'
          destination_repo: 'cameronrye/homebrew-aranet'
          destination_folder: 'Formula'
          user_email: 'cameronrye@users.noreply.github.com'
          user_name: 'github-actions[bot]'
          commit_message: 'Update aranet formula to ${{ steps.version.outputs.version }}'
